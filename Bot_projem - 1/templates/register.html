<!DOCTYPE html>
<html>
<head>
    <title>Kayıt Ol - İndirim Botu</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f4; }
        .form-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Kayıt Ol</h2>
        <form action="/register" method="POST">
            <input type="text" name="tc" placeholder="T.C. Kimlik No (11 Haneli)" required maxlength="11">
            <input type="email" name="email" placeholder="E-posta Adresi" required>
            <input type="password" name="sifre" placeholder="Şifre" required>
            <button type="submit">Kaydı Tamamla</button>
        </form>
        <p><a href="/">Ana Sayfaya Dön</a></p>
    </div>
</body>
</html>
