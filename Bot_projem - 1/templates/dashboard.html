<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Akıllı Bot Paneli</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; }
        .container { margin-top: 50px; }
        table { width: 80%; margin: 20px auto; border-collapse: collapse; background: #1e1e1e; }
        th, td { padding: 15px; border: 1px solid #333; text-align: left; }
        th { background-color: #333; color: #00d2ff; }
        .fiyat-eski { text-decoration: line-through; color: #ff4d4d; }
        .fiyat-yeni { color: #2ecc71; font-weight: bold; }
        input[type="text"] { padding: 10px; width: 400px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #00d2ff; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Akıllı Bot Canlı Veri Paneli</h1>
        <p style="color: #2ecc71;">● {{ mesaj }}</p>

        <form method="POST">
            <input type="text" name="urun_linki" placeholder="Takip etmek istediğiniz ürünün linkini buraya yapıştırın...">
            <button type="submit">Takibe Al</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Ürün Adı</th>
                    <th>Eski Fiyat</th>
                    <th>İndirimli Fiyat</th>
                    <th>Mağaza / Link</th>
                </tr>
            </thead>
            <tbody>
                {% for urun in urunler %}
                <tr>
                    <td>Senin Ürünün</td>
                    <td class="fiyat-eski">{{ urun.eski_fiyat }}</td>
                    <td class="fiyat-yeni">{{ urun.guncel_fiyat }}</td>
                    <td><a href="{{ urun.link }}" target="_blank" style="color: #00d2ff;">Ürüne Git</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
